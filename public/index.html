<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아파트 매물 트래커</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f8f8f6;
      --surface: #ffffff;
      --border: #e8e6e1;
      --text-primary: #1a1a18;
      --text-secondary: #6b6960;
      --text-tertiary: #9b9689;
      --accent: #2d5a27;
      --accent-light: #e8f0e6;
      --sale: #c73e1d;
      --jeonse: #2563eb;
      --monthly: #7c3aed;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.03);
    }

    html { font-size: 15px; }

    body {
      font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Header ────────────────────────────── */
    .header {
      padding: 3rem 0 2rem;
      text-align: center;
    }

    .header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.3rem;
    }

    .header .subtitle {
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: 400;
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1rem;
      font-size: 0.8rem;
      color: var(--text-tertiary);
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-dot.offline { background: #ef4444; animation: none; }

    /* ─── Container ─────────────────────────── */
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
    }

    /* ─── Summary Cards ─────────────────────── */
    .summary-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem 1.4rem;
      box-shadow: var(--shadow);
    }

    .summary-card .label {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.3rem;
    }

    .summary-card .value {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .summary-card .sub {
      font-size: 0.78rem;
      color: var(--text-secondary);
      margin-top: 0.15rem;
    }

    /* ─── Complex Section ──────────────────── */
    .complex-section {
      margin-bottom: 2.5rem;
    }

    .complex-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1rem;
      padding-bottom: 0.8rem;
      border-bottom: 2px solid var(--text-primary);
    }

    .complex-name {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .complex-meta {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .complex-info {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem 1.5rem;
      margin-bottom: 1.2rem;
      font-size: 0.82rem;
      color: var(--text-secondary);
    }

    .complex-info span::before {
      content: '';
      display: inline-block;
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--text-tertiary);
      margin-right: 0.4rem;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }

    /* ─── Trade Type Badges ─────────────────── */
    .badge-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.3rem 0.8rem;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: all 0.15s ease;
    }

    .badge.sale { background: #fef2f2; color: var(--sale); border-color: #fecaca; }
    .badge.jeonse { background: #eff6ff; color: var(--jeonse); border-color: #bfdbfe; }
    .badge.monthly { background: #f5f3ff; color: var(--monthly); border-color: #ddd6fe; }
    .badge.active { border-width: 2px; }
    .badge .count { font-weight: 800; }

    /* ─── Article Table ─────────────────────── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    thead {
      background: #fafaf8;
      border-bottom: 1px solid var(--border);
    }

    th {
      padding: 0.7rem 1rem;
      text-align: left;
      font-weight: 600;
      font-size: 0.72rem;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    td {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #f3f2ef;
      vertical-align: top;
    }

    tr:last-child td { border-bottom: none; }

    tr:hover td { background: #fdfcfa; }

    .price-cell {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em;
    }

    .price-cell.sale { color: var(--sale); }
    .price-cell.jeonse { color: var(--jeonse); }
    .price-cell.monthly { color: var(--monthly); }

    .type-tag {
      display: inline-block;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .type-tag.sale { background: #fef2f2; color: var(--sale); }
    .type-tag.jeonse { background: #eff6ff; color: var(--jeonse); }
    .type-tag.monthly { background: #f5f3ff; color: var(--monthly); }

    .desc-cell {
      color: var(--text-secondary);
      font-size: 0.78rem;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ─── Empty / Loading ──────────────────── */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-tertiary);
    }

    .empty-state .icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .empty-state h3 { font-size: 1.1rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 0.3rem; }
    .empty-state p { font-size: 0.85rem; }

    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-tertiary);
    }

    .loading .spinner {
      width: 24px; height: 24px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Footer ────────────────────────────── */
    .footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.75rem;
      color: var(--text-tertiary);
      border-top: 1px solid var(--border);
    }

    .footer a {
      color: var(--text-secondary);
      text-decoration: none;
    }

    .footer a:hover { text-decoration: underline; }

    /* ─── Responsive ────────────────────────── */
    @media (max-width: 640px) {
      html { font-size: 14px; }
      .header { padding: 2rem 0 1.5rem; }
      .container { padding: 0 1rem 3rem; }
      .complex-header { flex-direction: column; gap: 0.3rem; }
      .table-wrap { overflow-x: auto; }
      table { min-width: 600px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>아파트 매물 트래커</h1>
    <p class="subtitle">상록우성 · 상록라이프 (분당구 정자동) — 실시간 매물 현황</p>
    <div class="status-bar">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">로딩 중...</span>
    </div>
  </div>

  <div class="container">
    <div id="summaryRow" class="summary-row"></div>
    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        <p>데이터 불러오는 중...</p>
      </div>
    </div>
  </div>

  <div class="footer">
    출처: <a href="https://fin.land.naver.com" target="_blank" rel="noopener">네이버페이 부동산</a>
    · 30분마다 자동 업데이트
    · 참고용 데이터 — 정확성 미보증
  </div>

  <script>
    const DATA_URL = './data.json';
    const REFRESH_INTERVAL = 5 * 60 * 1000; // 5분마다 JSON 다시 확인

    // ─── 유틸 ────────────────────────────────
    function timeAgo(dateStr) {
      if (!dateStr) return '—';
      const diff = Date.now() - new Date(dateStr).getTime();
      const min = Math.floor(diff / 60000);
      if (min < 1) return '방금 전';
      if (min < 60) return `${min}분 전`;
      const hr = Math.floor(min / 60);
      if (hr < 24) return `${hr}시간 전`;
      const day = Math.floor(hr / 24);
      return `${day}일 전`;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '—';
      const d = new Date(dateStr);
      const kst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
      return `${kst.getFullYear()}.${String(kst.getMonth()+1).padStart(2,'0')}.${String(kst.getDate()).padStart(2,'0')} ${String(kst.getHours()).padStart(2,'0')}:${String(kst.getMinutes()).padStart(2,'0')} KST`;
    }

    function tradeClass(type) {
      if (!type) return '';
      if (type.includes('매매')) return 'sale';
      if (type.includes('전세')) return 'jeonse';
      if (type.includes('월세')) return 'monthly';
      return '';
    }

    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    // ─── 렌더링 ──────────────────────────────
    function render(data) {
      // Status
      const dot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');

      if (!data.updatedAt) {
        dot.classList.add('offline');
        statusText.textContent = '아직 데이터 없음 — 첫 크롤링 대기 중';
        document.getElementById('content').innerHTML = `
          <div class="empty-state">
            <div class="icon">📡</div>
            <h3>데이터 수집 대기 중</h3>
            <p>GitHub Actions 크롤러가 아직 실행되지 않았습니다.<br>Actions 탭에서 수동으로 실행하거나 30분 후 자동 실행됩니다.</p>
          </div>
        `;
        return;
      }

      dot.classList.remove('offline');
      statusText.textContent = `마지막 업데이트: ${formatDate(data.updatedAt)} (${timeAgo(data.updatedAt)})`;

      const complexes = data.complexes || [];

      // Summary row
      const totalArticles = complexes.reduce((sum, c) => sum + (c.articles?.length || 0), 0);
      const totalSale = complexes.reduce((sum, c) => sum + (c.articleCount?.sale || 0), 0);
      const totalJeonse = complexes.reduce((sum, c) => sum + (c.articleCount?.jeonse || 0), 0);
      const totalMonthly = complexes.reduce((sum, c) => sum + (c.articleCount?.monthly || 0), 0);

      document.getElementById('summaryRow').innerHTML = `
        <div class="summary-card">
          <div class="label">총 매물</div>
          <div class="value">${totalArticles}</div>
          <div class="sub">${complexes.length}개 단지</div>
        </div>
        <div class="summary-card">
          <div class="label" style="color:var(--sale)">매매</div>
          <div class="value" style="color:var(--sale)">${totalSale}</div>
        </div>
        <div class="summary-card">
          <div class="label" style="color:var(--jeonse)">전세</div>
          <div class="value" style="color:var(--jeonse)">${totalJeonse}</div>
        </div>
        <div class="summary-card">
          <div class="label" style="color:var(--monthly)">월세</div>
          <div class="value" style="color:var(--monthly)">${totalMonthly}</div>
        </div>
      `;

      // Complex sections
      if (complexes.length === 0 || complexes.every(c => c.error)) {
        document.getElementById('content').innerHTML = `
          <div class="empty-state">
            <div class="icon">🏗️</div>
            <h3>데이터 수집 실패</h3>
            <p>네이버 부동산 접속에 문제가 있습니다. 잠시 후 자동 재시도됩니다.</p>
          </div>
        `;
        return;
      }

      document.getElementById('content').innerHTML = complexes.map(c => renderComplex(c)).join('');
    }

    function renderComplex(complex) {
      if (complex.error) {
        return `
          <div class="complex-section">
            <div class="complex-header">
              <span class="complex-name">${escHtml(complex.name)}</span>
              <span class="complex-meta" style="color:var(--sale)">수집 실패</span>
            </div>
          </div>
        `;
      }

      const articles = complex.articles || [];
      const info = [];
      if (complex.address) info.push(complex.address);
      if (complex.totalUnits) info.push(`${complex.totalUnits}세대`);
      if (complex.builtYear) info.push(`${complex.builtYear} 준공`);

      const saleCount = complex.articleCount?.sale || 0;
      const jeonseCount = complex.articleCount?.jeonse || 0;
      const monthlyCount = complex.articleCount?.monthly || 0;

      return `
        <div class="complex-section" data-complex="${escHtml(complex.name)}">
          <div class="complex-header">
            <span class="complex-name">${escHtml(complex.name)}</span>
            <span class="complex-meta">${escHtml(complex.complexNumber ? `No.${complex.complexNumber}` : '')}</span>
          </div>
          ${info.length ? `<div class="complex-info">${info.map(i => `<span>${escHtml(i)}</span>`).join('')}</div>` : ''}
          <div class="badge-row">
            <span class="badge sale"><span class="count">${saleCount}</span> 매매</span>
            <span class="badge jeonse"><span class="count">${jeonseCount}</span> 전세</span>
            <span class="badge monthly"><span class="count">${monthlyCount}</span> 월세</span>
          </div>
          ${articles.length > 0 ? `
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>유형</th>
                    <th>가격</th>
                    <th>면적</th>
                    <th>층</th>
                    <th>방향</th>
                    <th>설명</th>
                    <th>확인일</th>
                  </tr>
                </thead>
                <tbody>
                  ${articles.map(a => {
                    const cls = tradeClass(a.tradeType);
                    const priceText = a.tradeType?.includes('월세')
                      ? `${a.deposit || ''}/${a.monthlyRent || ''}`
                      : (a.price || '—');
                    const areaPy = a.pyeong ? `${a.pyeong}평` : (a.area ? `${Number(a.area).toFixed(0)}㎡` : '—');

                    return `<tr>
                      <td><span class="type-tag ${cls}">${escHtml(a.tradeType || '—')}</span></td>
                      <td class="price-cell ${cls}">${escHtml(priceText)}</td>
                      <td>${escHtml(areaPy)}</td>
                      <td>${escHtml(a.floor || '—')}</td>
                      <td>${escHtml(a.direction || '—')}</td>
                      <td class="desc-cell" title="${escHtml(a.description)}">${escHtml(a.description || '—')}</td>
                      <td style="color:var(--text-tertiary);font-size:0.75rem">${escHtml(a.confirmDate || '—')}</td>
                    </tr>`;
                  }).join('')}
                </tbody>
              </table>
            </div>
          ` : `
            <div class="empty-state" style="padding:2rem">
              <p>현재 등록된 매물이 없습니다</p>
            </div>
          `}
        </div>
      `;
    }

    // ─── 데이터 로드 ─────────────────────────
    async function loadData() {
      try {
        const res = await fetch(DATA_URL + '?t=' + Date.now());
        if (!res.ok) throw new Error(res.status);
        const data = await res.json();
        render(data);
      } catch (err) {
        console.error('데이터 로드 실패:', err);
        document.getElementById('statusDot').classList.add('offline');
        document.getElementById('statusText').textContent = '데이터 로드 실패';
      }
    }

    // ─── 초기화 ──────────────────────────────
    loadData();
    setInterval(loadData, REFRESH_INTERVAL);
  </script>
</body>
</html>
