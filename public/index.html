<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>분당 정자동 아파트 실거래</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#f8f8f6;--surface:#fff;--border:#e8e6e1;
      --text-1:#1a1a18;--text-2:#6b6960;--text-3:#9b9689;
      --sale:#c73e1d;--jeonse:#2563eb;--monthly:#7c3aed;
      --accent:#2d5a27;--radius:12px;
      --shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.03);
    }
    html{font-size:15px}
    body{font-family:'Pretendard Variable',-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text-1);line-height:1.6;-webkit-font-smoothing:antialiased}
    .header{padding:2.5rem 0 1.5rem;text-align:center}
    .header h1{font-size:1.5rem;font-weight:700;letter-spacing:-.02em}
    .header .sub{color:var(--text-2);font-size:.85rem;margin-top:.2rem}
    .status{display:flex;align-items:center;justify-content:center;gap:.4rem;margin-top:.8rem;font-size:.78rem;color:var(--text-3)}
    .dot{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:pulse 2s ease-in-out infinite}
    .dot.off{background:#ef4444;animation:none}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .container{max-width:960px;margin:0 auto;padding:0 1.5rem 4rem}
    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.8rem;margin-bottom:2rem}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.2rem;box-shadow:var(--shadow)}
    .card .lbl{font-size:.7rem;font-weight:500;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.2rem}
    .card .val{font-size:1.6rem;font-weight:700;letter-spacing:-.02em}
    .card .detail{font-size:.75rem;color:var(--text-2);margin-top:.1rem}
    .section{margin-bottom:2.5rem}
    .section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:.8rem;padding-bottom:.6rem;border-bottom:2px solid var(--text-1)}
    .section-title{font-size:1.2rem;font-weight:700;letter-spacing:-.01em}
    .section-meta{font-size:.78rem;color:var(--text-2)}
    .info-row{display:flex;flex-wrap:wrap;gap:.4rem 1.2rem;margin-bottom:1rem;font-size:.8rem;color:var(--text-2)}
    .info-row span::before{content:'';display:inline-block;width:3px;height:3px;border-radius:50%;background:var(--text-3);margin-right:.35rem;vertical-align:middle;position:relative;top:-1px}
    .latest-box{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:1.2rem}
    .latest-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;box-shadow:var(--shadow)}
    .latest-card .type{font-size:.7rem;font-weight:600;margin-bottom:.3rem}
    .latest-card .type.sale{color:var(--sale)}.latest-card .type.jeonse{color:var(--jeonse)}
    .latest-card .price{font-size:1.3rem;font-weight:700;letter-spacing:-.02em}
    .latest-card .price.sale{color:var(--sale)}.latest-card .price.jeonse{color:var(--jeonse)}
    .latest-card .meta{font-size:.72rem;color:var(--text-3);margin-top:.2rem}
    .tabs{display:flex;gap:.4rem;margin-bottom:.8rem}
    .tab{padding:.35rem .8rem;border-radius:100px;font-size:.75rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text-2);transition:all .15s}
    .tab.active{border-color:var(--text-1);background:var(--text-1);color:#fff}
    .tab .cnt{font-weight:800}
    .tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
    table{width:100%;border-collapse:collapse;font-size:.8rem}
    thead{background:#fafaf8;border-bottom:1px solid var(--border)}
    th{padding:.6rem .8rem;text-align:left;font-weight:600;font-size:.7rem;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
    td{padding:.65rem .8rem;border-bottom:1px solid #f3f2ef;vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#fdfcfa}
    .tag{display:inline-block;padding:.12rem .4rem;border-radius:4px;font-size:.68rem;font-weight:600}
    .tag.sale{background:#fef2f2;color:var(--sale)}.tag.jeonse{background:#eff6ff;color:var(--jeonse)}.tag.monthly{background:#f5f3ff;color:var(--monthly)}
    .price-c{font-weight:700;font-variant-numeric:tabular-nums}
    .price-c.sale{color:var(--sale)}.price-c.jeonse{color:var(--jeonse)}.price-c.monthly{color:var(--monthly)}
    .cancelled{text-decoration:line-through;opacity:.5}
    .empty{text-align:center;padding:3rem;color:var(--text-3)}
    .footer{text-align:center;padding:2rem;font-size:.72rem;color:var(--text-3);border-top:1px solid var(--border)}
    .footer a{color:var(--text-2);text-decoration:none}
    @media(max-width:640px){html{font-size:14px}.container{padding:0 1rem 3rem}.latest-box{grid-template-columns:1fr}.tbl-wrap{overflow-x:auto}table{min-width:550px}}
  </style>
</head>
<body>
  <div class="header">
    <h1>분당 정자동 아파트 실거래</h1>
    <p class="sub">상록마을우성 · 상록마을라이프</p>
    <div class="status"><span class="dot" id="dot"></span><span id="st">로딩 중...</span></div>
  </div>
  <div class="container">
    <div class="cards" id="cards"></div>
    <div id="content"><div class="empty">데이터 로딩 중...</div></div>
  </div>
  <div class="footer">
    출처: <a href="https://hogangnono.com" target="_blank">호갱노노</a> (실거래가 공공데이터 기반)
    · 30분마다 자동 업데이트 · 참고용
  </div>
  <script>
    const $ = s => document.querySelector(s);
    const h = s => { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; };
    
    function timeAgo(d) {
      if (!d) return '—';
      const m = Math.floor((Date.now() - new Date(d).getTime()) / 60000);
      if (m < 1) return '방금 전';
      if (m < 60) return m + '분 전';
      const hr = Math.floor(m / 60);
      if (hr < 24) return hr + '시간 전';
      return Math.floor(hr / 24) + '일 전';
    }

    function fmtDate(d) {
      if (!d) return '—';
      return new Date(d).toISOString().split('T')[0].replace(/-/g, '.');
    }

    function fmtKST(d) {
      if (!d) return '—';
      const dt = new Date(new Date(d).getTime() + 9*3600000);
      return `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')} KST`;
    }

    function cls(t) {
      if (!t) return '';
      if (t.includes('매매')) return 'sale';
      if (t.includes('전세')) return 'jeonse';
      return 'monthly';
    }

    function render(data) {
      if (!data.updatedAt) {
        $('#dot').classList.add('off');
        $('#st').textContent = '데이터 수집 대기 중';
        $('#content').innerHTML = '<div class="empty">GitHub Actions가 아직 실행되지 않았습니다.</div>';
        return;
      }

      $('#dot').classList.remove('off');
      $('#st').textContent = `${fmtKST(data.updatedAt)} (${timeAgo(data.updatedAt)})`;

      const cx = data.complexes || [];
      const totalTrades = cx.reduce((s, c) => s + (c.trades?.length || 0), 0);
      const totalSale = cx.reduce((s, c) => s + (c.tradeCount?.sale || 0), 0);
      const totalJeonse = cx.reduce((s, c) => s + (c.tradeCount?.jeonse || 0), 0);

      // 최근 매매가 (우성 기준)
      const wooseong = cx.find(c => c.hash === '5dt68');
      const latestPrice = wooseong?.latestTrades?.sale?.price || '—';

      $('#cards').innerHTML = `
        <div class="card"><div class="lbl">최근 실거래</div><div class="val">${totalTrades}</div><div class="detail">${cx.length}개 단지</div></div>
        <div class="card"><div class="lbl" style="color:var(--sale)">매매</div><div class="val" style="color:var(--sale)">${totalSale}</div></div>
        <div class="card"><div class="lbl" style="color:var(--jeonse)">전세</div><div class="val" style="color:var(--jeonse)">${totalJeonse}</div></div>
        <div class="card"><div class="lbl">우성 최근 매매</div><div class="val" style="font-size:1.2rem">${h(latestPrice)}</div><div class="detail">${wooseong?.latestTrades?.sale ? h(wooseong.latestTrades.sale.area) + '평 · ' + fmtDate(wooseong.latestTrades.sale.date) : ''}</div></div>
      `;

      $('#content').innerHTML = cx.map(c => renderComplex(c)).join('');

      // Tab switching
      document.querySelectorAll('.tabs').forEach(tabs => {
        tabs.querySelectorAll('.tab').forEach(tab => {
          tab.onclick = () => {
            const section = tab.closest('.section');
            section.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const type = tab.dataset.type;
            section.querySelectorAll('tbody tr').forEach(tr => {
              tr.style.display = (!type || type === 'all' || tr.dataset.type === type) ? '' : 'none';
            });
          };
        });
      });
    }

    function renderComplex(c) {
      const trades = c.trades || [];
      const info = [c.address, c.totalUnits + '세대', c.dongs, c.builtYear + ' 준공'].filter(Boolean);

      return `
        <div class="section">
          <div class="section-head">
            <span class="section-title">${h(c.alias || c.name)}</span>
            <span class="section-meta">${h(c.name)}</span>
          </div>
          <div class="info-row">${info.map(i => `<span>${h(i)}</span>`).join('')}</div>
          <div class="latest-box">
            ${c.latestTrades?.sale ? `
              <div class="latest-card">
                <div class="type sale">최근 매매</div>
                <div class="price sale">${h(c.latestTrades.sale.price)}</div>
                <div class="meta">${h(c.latestTrades.sale.area)}평 · ${c.latestTrades.sale.floor}층${c.latestTrades.sale.dong ? ' · ' + c.latestTrades.sale.dong + '동' : ''} · ${fmtDate(c.latestTrades.sale.date)}</div>
              </div>
            ` : '<div class="latest-card"><div class="type sale">최근 매매</div><div class="price">—</div></div>'}
            ${c.latestTrades?.jeonse ? `
              <div class="latest-card">
                <div class="type jeonse">최근 전세</div>
                <div class="price jeonse">${h(c.latestTrades.jeonse.price)}</div>
                <div class="meta">${h(c.latestTrades.jeonse.area)}평 · ${c.latestTrades.jeonse.floor}층 · ${fmtDate(c.latestTrades.jeonse.date)}</div>
              </div>
            ` : '<div class="latest-card"><div class="type jeonse">최근 전세</div><div class="price">—</div></div>'}
          </div>
          <div class="tabs">
            <div class="tab active" data-type="all">전체 <span class="cnt">${trades.length}</span></div>
            <div class="tab" data-type="매매">매매 <span class="cnt">${c.tradeCount?.sale||0}</span></div>
            <div class="tab" data-type="전세">전세 <span class="cnt">${c.tradeCount?.jeonse||0}</span></div>
            <div class="tab" data-type="월세">월세 <span class="cnt">${c.tradeCount?.monthly||0}</span></div>
          </div>
          ${trades.length ? `
            <div class="tbl-wrap"><table>
              <thead><tr><th>유형</th><th>가격</th><th>평형</th><th>층</th><th>동</th><th>계약일</th><th>등록일</th></tr></thead>
              <tbody>${trades.map(t => {
                const c2 = cls(t.tradeType);
                return `<tr data-type="${h(t.tradeType)}" class="${t.isCancelled?'cancelled':''}">
                  <td><span class="tag ${c2}">${h(t.tradeType)}</span></td>
                  <td class="price-c ${c2}">${h(t.priceFormatted)}</td>
                  <td>${h(t.areaType)}평</td>
                  <td>${t.floor||'—'}층</td>
                  <td>${h(t.dong)||'—'}</td>
                  <td style="font-size:.72rem;color:var(--text-3)">${h(t.dateFormatted)}</td>
                  <td style="font-size:.72rem;color:var(--text-3)">${fmtDate(t.dateAdded)}</td>
                </tr>`;
              }).join('')}</tbody>
            </table></div>
          ` : '<div class="empty">실거래 내역 없음</div>'}
        </div>
      `;
    }

    async function load() {
      try {
        const r = await fetch('./data.json?t=' + Date.now());
        if (!r.ok) throw new Error(r.status);
        render(await r.json());
      } catch(e) {
        $('#dot').classList.add('off');
        $('#st').textContent = '로드 실패';
      }
    }

    load();
    setInterval(load, 300000);
  </script>
</body>
</html>
