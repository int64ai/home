name: 네이버 부동산 크롤링

on:
  schedule:
    - cron: '*/30 * * * *'
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/scrape.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 크롤링 실행
        run: node scripts/scrape.js

      - name: 데이터 커밋 & 푸시
        run: |
          git config user.name "Naver Land Bot"
          git config user.email "bot@naver-land-tracker.local"
          if git diff --quiet public/data.json 2>/dev/null; then
            echo "변경 없음"
          else
            git add public/data.json
            git commit -m "📊 매물 업데이트 $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')"
            git push
          fi
