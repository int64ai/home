name: 네이버 부동산 크롤링

on:
  schedule:
    # 매 30분마다 실행
    - cron: '*/30 * * * *'
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/scrape.yml'
  workflow_dispatch: # 수동 실행 가능

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: Playwright 브라우저 설치
        run: npx playwright install chromium --with-deps

      - name: 크롤링 실행
        run: npm run scrape
        env:
          NODE_ENV: production

      - name: 데이터 변경 확인 & 커밋
        run: |
          git config user.name "Naver Land Bot"
          git config user.email "bot@naver-land-tracker.local"
          
          if git diff --quiet public/data.json 2>/dev/null; then
            echo "데이터 변경 없음 — 스킵"
          else
            git add public/data.json
            git commit -m "📊 매물 데이터 업데이트 $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
